name: Daily Pain Points Detection

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（北京时间早上 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run pain points detection
        run: |
          python detect_pain_points.py
        env:
          # 知乎登录 Cookie（在 GitHub Repo Settings → Secrets → Actions 中配置）
          ZHIHU_COOKIE: ${{ secrets.ZHIHU_COOKIE }}
          # 小红书登录 Cookie（在 GitHub Repo Settings → Secrets → Actions 中配置）
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}

      - name: Commit and push report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add PAIN_POINTS_REPORT.md
          git diff --staged --quiet || git commit -m "🤖 自动更新痛点报告 $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
